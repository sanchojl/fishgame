<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рыбалка: Золотой Пеленгас Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --sea-dark: #1e40af;
            --sea-light: #3b82f6;
            --sky-top: #0ea5e9;
            --sky-bottom: #bae6fd;
            --gold: #fbbf24;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body {
            margin: 0; padding: 0;
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
            color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* Шапка */
        #header { 
            padding: 25px 15px; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(5px);
            z-index: 50; 
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        #status { 
            font-size: 20px; 
            font-weight: 800; 
            color: var(--gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        /* Игровой мир */
        #world {
            position: relative;
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Облака */
        .cloud {
            position: absolute; background: white; border-radius: 50px;
            opacity: 0.8; animation: moveCloud linear infinite;
        }
        @keyframes moveCloud {
            from { left: -150px; } to { left: 110%; }
        }

        /* Море */
        #sea {
            position: relative;
            height: 65%;
            background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
            border-top: 5px solid rgba(255,255,255,0.4);
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Камыши на фоне */
        .reeds {
            position: absolute; bottom: 100%; left: 0; width: 100%; height: 40px;
            display: flex; justify-content: space-around; align-items: flex-end;
            z-index: 5;
        }
        .reed {
            width: 4px; height: 35px; background: #166534; border-radius: 4px;
            transform-origin: bottom; animation: sway 3s infinite ease-in-out;
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); }
        }

        /* Лодка и Дед */
        #boat-container {
            position: absolute; top: -35px; left: 15%;
            animation: boatRock 4s infinite ease-in-out;
            z-index: 20;
        }
        #boat {
            width: 150px; height: 45px;
            background: linear-gradient(180deg, #78350f 0%, #451a03 100%);
            border-radius: 5px 5px 60px 60px;
            position: relative;
            border-top: 3px solid #92400e;
        }
        #oldman {
            position: absolute; bottom: 42px; left: 35px;
            width: 40px; height: 50px; background: #1e293b;
            border-radius: 50% 50% 10px 10px;
        }
        #oldman::before { /* Кепка */
            content: ''; position: absolute; top: -15px; left: 5px;
            width: 30px; height: 15px; background: #991b1b; border-radius: 20px 20px 0 0;
        }
        #oldman::after { /* Лицо/Голова */
            content: ''; position: absolute; top: -10px; left: 8px;
            width: 24px; height: 24px; background: #334155; border-radius: 50%;
        }

        /* Удочка */
        #rod {
            position: absolute; width: 4px; height: 170px;
            background: #27272a; bottom: 35px; left: 110px;
            transform-origin: bottom center; transform: rotate(65deg);
            border-radius: 2px;
        }

        /* Леска */
        #line {
            position: absolute; width: 1px; background: rgba(255,255,255,0.5);
            top: 0; left: 2px; transform-origin: top center;
            display: none; z-index: 15;
        }

        /* Поплавок и круги */
        #float-zone {
            position: absolute; left: 65%; top: 55%; transform: translate(-50%, -50%);
            display: none; z-index: 25;
        }
        #float {
            width: 12px; height: 40px;
            background: linear-gradient(to bottom, #ef4444 40%, #fff 40%, #fff 60%, #ef4444 60%);
            border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .water-ring {
            position: absolute; top: 80%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 10px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; animation: ring 2s infinite;
        }
        @keyframes ring {
            from { width: 10px; height: 5px; opacity: 1; }
            to { width: 60px; height: 30px; opacity: 0; }
        }

        .bobbing { animation: floatBob 2.5s infinite ease-in-out; }
        @keyframes floatBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
        .bite { animation: franticShake 0.1s infinite alternate; }
        @keyframes franticShake { from { transform: translate(-2px, 15px); } to { transform: translate(2px, 20px); } }

        /* Золотой Пеленгас */
        #goldfish {
            position: absolute; width: 55px; height: 25px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: 50% 80% 80% 50%; bottom: -50px; z-index: 30;
            opacity: 0; filter: drop-shadow(0 0 10px var(--gold));
        }
        #goldfish::after { /* Хвост */
            content: ''; position: absolute; right: -12px; top: 5px;
            border-top: 8px solid transparent; border-bottom: 8px solid transparent;
            border-right: 18px solid #f59e0b;
        }

        .fish-jump { animation: jumpPro 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) forwards; }
        @keyframes jumpPro {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(50px, -150px) rotate(-20deg); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(100px, 0) rotate(20deg); opacity: 0; }
        }

        /* Кнопка */
        #btn-action {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white; border: none; padding: 25px;
            font-size: 22px; font-weight: 900; width: 100%;
            cursor: pointer; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.3);
        }
        #btn-action:active { transform: scale(0.98); filter: brightness(1.1); }

        /* Эффект победы */
        .win-flash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events: none; z-index: 100;
            background: radial-gradient(circle, rgba(251,191,36,0.3) 0%, transparent 70%);
            display: none;
        }

        @keyframes boatRock {
            0%, 100% { transform: rotate(-1.5deg) translateY(0); }
            50% { transform: rotate(1.5deg) translateY(4px); }
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="status">Забрасывай, старик! Вечерний клёв пошёл.</div>
    </div>
    
    <div id="world">
        <div class="reeds" id="reeds-box"></div>

        <div id="sea">
            <div id="boat-container">
                <div id="oldman"></div>
                <div id="boat"></div>
                <div id="rod"><div id="line"></div></div>
            </div>

            <div id="float-zone">
                <div class="water-ring"></div>
                <div id="float"></div>
            </div>
            
            <div id="goldfish"></div>
        </div>
    </div>

    <div class="win-flash" id="win-fx"></div>

    <button id="btn-action">Забросить снасть</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const MAKE_WEBHOOK_URL = 'https://hook.eu1.make.com/7nuhjsgcpkj7cjpkm63gjmkj75jc8njl';

        const statusEl = document.getElementById('status');
        const floatZone = document.getElementById('float-zone');
        const floatEl = document.getElementById('float');
        const lineEl = document.getElementById('line');
        const goldfishEl = document.getElementById('goldfish');
        const btnAction = document.getElementById('btn-action');
        const winFx = document.getElementById('win-fx');

        let gameState = 'idle';
        let biteTimeout, escapeTimeout;

        // Генерация декораций
        function setupWorld() {
            const reedsBox = document.getElementById('reeds-box');
            for(let i=0; i<30; i++) {
                const r = document.createElement('div');
                r.className = 'reed';
                r.style.height = (20 + Math.random() * 25) + 'px';
                r.style.animationDelay = (Math.random() * 2) + 's';
                reedsBox.appendChild(r);
            }
            for(let i=0; i<3; i++) {
                const c = document.createElement('div');
                c.className = 'cloud';
                c.style.width = (100 + Math.random() * 100) + 'px';
                c.style.height = '40px';
                c.style.top = (50 + Math.random() * 100) + 'px';
                c.style.animationDuration = (20 + Math.random() * 20) + 's';
                c.style.animationDelay = -(Math.random() * 20) + 's';
                document.getElementById('world').appendChild(c);
            }
        }
        setupWorld();

        function updateLine() {
            if (gameState === 'idle' || gameState === 'finished') {
                lineEl.style.display = 'none';
                return;
            }
            lineEl.style.display = 'block';
            
            const rodRect = document.getElementById('rod').getBoundingClientRect();
            const floatRect = floatEl.getBoundingClientRect();
            
            // Кончик удочки (геометрия)
            const rodAngle = 65 * Math.PI / 180;
            const rodLen = 170;
            const x1 = rodRect.left + 2;
            const y1 = rodRect.bottom - (rodLen * Math.cos(rodAngle));

            const x2 = floatRect.left + 6;
            const y2 = floatRect.top;

            const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
            const lineAngle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;

            lineEl.style.height = length + 'px';
            lineEl.style.transform = `rotate(${lineAngle - 90}deg)`;
            lineEl.style.top = '-1px'; 
            lineEl.style.left = '2px';
        }

        setInterval(updateLine, 30);

        btnAction.addEventListener('click', () => {
            if (gameState === 'idle') {
                startFishing();
            } else if (gameState === 'biting') {
                catchFish();
            } else if (gameState === 'waiting') {
                finishGame("Эх, спугнул! Рано подсек.");
            } else if (gameState === 'finished') {
                tg.close();
            }
        });

        function startFishing() {
            gameState = 'waiting';
            btnAction.innerText = "ПОДСЕКАЙ!";
            btnAction.style.background = "linear-gradient(135deg, #ef4444, #b91c1c)";
            statusEl.innerText = "Поплавок на воде. Ждём поклёвку...";
            floatZone.style.display = 'block';
            floatEl.className = 'bobbing';
            
            const timeToBite = Math.random() * 3000 + 2000;
            biteTimeout = setTimeout(() => {
                gameState = 'biting';
                floatEl.className = 'bite';
                statusEl.innerText = "КЛЮЁТ! ТЯНИ ПЕЛЕНГАСА!";
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

                escapeTimeout = setTimeout(() => {
                    if (gameState === 'biting') finishGame("Ушёл косяк... Наживку сбили.");
                }, 700);
            }, timeToBite);
        }

        function catchFish() {
            clearTimeout(escapeTimeout);
            const roll = Math.random();
            if (roll > 0.94) {
                winFx.style.display = 'block';
                sendWin();
                finishGame("🏆 ЗОЛОТОЙ ПЕЛЕНГАС! Вот это удача!");
            } else if (roll > 0.4) {
                finishGame("🐟 Есть пеленгас! Увесистый достался.");
            } else {
                finishGame("👟 Старый сапог... Канал почистил.");
            }
        }

        function sendWin() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                fetch(MAKE_WEBHOOK_URL, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({user_id: user.id, name: user.first_name, prize: "gold_pelengas"})
                });
            }
        }

        function finishGame(msg) {
            gameState = 'finished';
            clearTimeout(biteTimeout);
            clearTimeout(escapeTimeout);
            statusEl.innerText = msg;
            floatZone.style.display = 'none';
            btnAction.innerText = "Вернуться в канал";
            btnAction.style.background = "#0f172a";
            if(msg.includes("🏆")) btnAction.style.background = "#059669";
        }

        function triggerFishJump() {
            if (gameState !== 'idle' || goldfishEl.classList.contains('fish-jump')) return;
            goldfishEl.style.left = (40 + Math.random() * 40) + '%';
            goldfishEl.classList.add('fish-jump');
            setTimeout(() => {
                goldfishEl.classList.remove('fish-jump');
                setTimeout(triggerFishJump, Math.random() * 15000 + 10000);
            }, 2500);
        }
        setTimeout(triggerFishJump, 5000);
    </script>
</body>
</html>
