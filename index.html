<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рыбалка: Золотой Пеленгас Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --sea-dark: #1e3a8a;
            --sea-mid: #2563eb;
            --sea-light: #60a5fa;
            --gold: #fbbf24;
        }

        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body {
            margin: 0; padding: 0;
            background: #0ea5e9; /* Чистое небо */
            color: white; font-family: 'Segoe UI', sans-serif;
            text-align: center; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* Шапка */
        #header { 
            padding: 20px 10px; 
            background: rgba(15, 23, 42, 0.9); 
            z-index: 100; 
            border-bottom: 3px solid var(--gold);
        }
        #status { 
            font-size: 19px; font-weight: 900; color: var(--gold);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Игровой мир */
        #world {
            position: relative;
            flex-grow: 1;
            background: linear-gradient(180deg, #7dd3fc 0%, #2563eb 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Все элементы прижимаем вниз */
        }

        /* Море с анимацией волн */
        #sea {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 75%;
            background: var(--sea-mid);
            overflow: hidden;
            box-shadow: inset 0 10px 50px rgba(0,0,0,0.4);
        }

        /* Декоративные волны */
        .wave {
            position: absolute; bottom: 0; left: 0; width: 200%; height: 100%;
            background: url('https://svgshare.com/i/zeS.svg'); /* Прозрачный паттерн волн */
            opacity: 0.2;
            animation: moveWaves 10s linear infinite;
        }
        @keyframes moveWaves {
            from { transform: translateX(0); } to { transform: translateX(-50%); }
        }

        /* Лодка и Дед (теперь снизу!) */
        #boat-container {
            position: absolute; 
            bottom: 20px; /* Над кнопкой */
            left: 10%;
            animation: boatRock 4s infinite ease-in-out;
            z-index: 50;
        }
        #boat {
            width: 180px; height: 55px;
            background: linear-gradient(180deg, #5d4037 0%, #3e2723 100%);
            border-radius: 5px 5px 80px 80px;
            position: relative;
            border-top: 4px solid #795548;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #oldman {
            position: absolute; bottom: 50px; left: 45px;
            width: 45px; height: 55px; background: #263238;
            border-radius: 50% 50% 10px 10px;
        }
        #oldman::after { /* Голова */
            content: ''; position: absolute; top: -12px; left: 10px;
            width: 26px; height: 26px; background: #455a64; border-radius: 50%;
            border: 2px solid #263238;
        }

        /* Удочка (смотрит вверх-вправо) */
        #rod {
            position: absolute; width: 5px; height: 200px;
            background: #212121; bottom: 40px; left: 130px;
            transform-origin: bottom center; transform: rotate(40deg);
            border-radius: 2px;
            z-index: 60;
        }

        /* Леска */
        #line {
            position: absolute; width: 1px; background: rgba(255,255,255,0.7);
            top: 0; left: 2px; transform-origin: top center;
            display: none; z-index: 45;
        }

        /* Поплавок */
        #float-zone {
            position: absolute; left: 70%; top: 40%; transform: translate(-50%, -50%);
            display: none; z-index: 40;
        }
        #float {
            width: 14px; height: 45px;
            background: linear-gradient(to bottom, #ff5252 40%, #fff 40%, #fff 60%, #ff5252 60%);
            border-radius: 7px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .water-ring {
            position: absolute; top: 85%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 10px; border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%; animation: ring 2s infinite;
        }
        @keyframes ring {
            from { width: 10px; height: 5px; opacity: 1; }
            to { width: 80px; height: 40px; opacity: 0; }
        }

        .bobbing { animation: floatBob 2.5s infinite ease-in-out; }
        @keyframes floatBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
        .bite { animation: intenseBite 0.15s infinite; }
        @keyframes intenseBite { from { transform: translateY(15px); } to { transform: translateY(25px); } }

        /* Золотой Пеленгас */
        #goldfish {
            position: absolute; width: 60px; height: 30px;
            background: linear-gradient(135deg, #ffca28 0%, #ff8f00 100%);
            border-radius: 50% 80% 80% 50%; bottom: -50px; z-index: 35;
            opacity: 0; filter: drop-shadow(0 0 15px var(--gold));
        }
        #goldfish::after {
            content: ''; position: absolute; right: -15px; top: 7px;
            border-top: 10px solid transparent; border-bottom: 10px solid transparent;
            border-right: 20px solid #ff8f00;
        }

        .fish-jump { animation: jumpPro 3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes jumpPro {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(-80px, -180px) rotate(-30deg); opacity: 1; }
            100% { transform: translate(-160px, 0) rotate(30deg); opacity: 0; }
        }

        /* Кнопка */
        #btn-action {
            background: linear-gradient(180deg, #ff9800 0%, #e65100 100%);
            color: white; border: none; padding: 25px;
            font-size: 24px; font-weight: 900; width: 100%;
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            z-index: 200; position: relative;
        }
        #btn-action:active { filter: brightness(1.2); transform: translateY(2px); }

        @keyframes boatRock {
            0%, 100% { transform: rotate(-2deg) translateY(0); }
            50% { transform: rotate(2deg) translateY(5px); }
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="status">Старик на месте. Ждём трофей!</div>
    </div>
    
    <div id="world">
        <div id="sea">
            <div class="wave"></div>
            <div id="goldfish"></div>

            <div id="float-zone">
                <div class="water-ring"></div>
                <div id="float"></div>
            </div>
        </div>

        <div id="boat-container">
            <div id="oldman"></div>
            <div id="boat"></div>
            <div id="rod"><div id="line"></div></div>
        </div>
    </div>

    <button id="btn-action">ЗАБРОСИТЬ СНАСТЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const MAKE_WEBHOOK_URL = 'https://hook.eu1.make.com/7nuhjsgcpkj7cjpkm63gjmkj75jc8njl';

        const statusEl = document.getElementById('status');
        const floatZone = document.getElementById('float-zone');
        const floatEl = document.getElementById('float');
        const lineEl = document.getElementById('line');
        const goldfishEl = document.getElementById('goldfish');
        const btnAction = document.getElementById('btn-action');

        let gameState = 'idle';
        let biteTimeout, escapeTimeout;

        function updateLine() {
            if (gameState === 'idle' || gameState === 'finished') {
                lineEl.style.display = 'none';
                return;
            }
            lineEl.style.display = 'block';
            
            const rodRect = document.getElementById('rod').getBoundingClientRect();
            const floatRect = floatEl.getBoundingClientRect();
            const worldRect = document.getElementById('world').getBoundingClientRect();
            
            // Математика кончика удочки
            const angle = 40 * Math.PI / 180;
            const rodLen = 200;
            const x1 = rodRect.left + 2;
            const y1 = rodRect.bottom - (rodLen * Math.cos(angle));

            const x2 = floatRect.left + 7;
            const y2 = floatRect.top;

            const length = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
            const lineAngle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;

            lineEl.style.height = length + 'px';
            lineEl.style.transform = `rotate(${lineAngle - 90}deg)`;
            
            // Коррекция позиции относительно контейнера
            lineEl.style.top = (y1 - rodRect.top) + 'px';
            lineEl.style.left = '2px';
        }

        setInterval(updateLine, 20);

        btnAction.addEventListener('click', () => {
            if (gameState === 'idle') {
                startFishing();
            } else if (gameState === 'biting') {
                catchFish();
            } else if (gameState === 'waiting') {
                finishGame("Эх, сорвался! Не спеши, старик.");
            } else if (gameState === 'finished') {
                tg.close();
            }
        });

        function startFishing() {
            gameState = 'waiting';
            btnAction.innerText = "ПОДСЕКАЙ!";
            btnAction.style.background = "#d32f2f";
            statusEl.innerText = "Снасть в воде... Тишина...";
            floatZone.style.display = 'block';
            floatEl.className = 'bobbing';
            
            const timeToBite = Math.random() * 3000 + 2000;
            biteTimeout = setTimeout(() => {
                gameState = 'biting';
                floatEl.className = 'bite';
                statusEl.innerText = "КЛЮЁТ! ТЯНИ!!!";
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

                escapeTimeout = setTimeout(() => {
                    if (gameState === 'biting') finishGame("Ушёл пеленгас... Наживку съел.");
                }, 800);
            }, timeToBite);
        }

        function catchFish() {
            clearTimeout(escapeTimeout);
            const roll = Math.random();
            if (roll > 0.95) {
                sendWin();
                finishGame("🏆 ЗОЛОТОЙ ПЕЛЕНГАС! ВОТ ЭТО УЛОВ!");
            } else if (roll > 0.4) {
                finishGame("🐟 Есть пеленгас! Хорошая рыба.");
            } else {
                finishGame("👟 Старый ботинок... Бывает и такое.");
            }
        }

        function sendWin() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                fetch(MAKE_WEBHOOK_URL, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({user_id: user.id, name: user.first_name, prize: "gold_pelengas"})
                });
            }
        }

        function finishGame(msg) {
            gameState = 'finished';
            clearTimeout(biteTimeout);
            clearTimeout(escapeTimeout);
            statusEl.innerText = msg;
            floatZone.style.display = 'none';
            btnAction.innerText = "В КАНАЛ";
            btnAction.style.background = "#263238";
            if(msg.includes("🏆")) btnAction.style.background = "#2e7d32";
        }

        // Прыжки рыбы
        function triggerJump() {
            if (gameState !== 'idle' || goldfishEl.classList.contains('fish-jump')) return;
            goldfishEl.style.left = (60 + Math.random() * 20) + '%';
            goldfishEl.classList.add('fish-jump');
            setTimeout(() => {
                goldfishEl.classList.remove('fish-jump');
                setTimeout(triggerJump, Math.random() * 15000 + 10000);
            }, 3000);
        }
        setTimeout(triggerJump, 5000);
    </script>
</body>
</html>
