<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Биржа Улова: Выложить</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #fbbf24;
            --text: #f8fafc;
            --input-border: #334155;
            --btn-green: #22c55e;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); 
            margin: 0; padding: 16px; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        h2 { 
            margin: 0 0 20px 0; font-size: 24px; text-align: center; 
            color: var(--accent); letter-spacing: 1px; text-transform: uppercase;
        }

        label { 
            display: block; margin: 15px 0 8px 4px; 
            font-size: 14px; font-weight: 600; color: #94a3b8;
        }

        select, input, textarea { 
            width: 100%; padding: 14px; 
            background: #0f172a; border: 2px solid var(--input-border);
            border-radius: 12px; color: white; font-size: 16px; 
            box-sizing: border-box; transition: 0.3s; outline: none;
        }

        select:focus, input:focus, textarea:focus { 
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.1);
        }

        .btn { 
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white; border: none; padding: 18px; 
            width: 100%; border-radius: 14px; font-size: 18px; 
            font-weight: 800; cursor: pointer; margin-top: 25px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            transition: 0.2s; text-transform: uppercase;
        }

        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .footer-info { 
            margin-top: 20px; font-size: 11px; 
            color: #64748b; text-align: center; line-height: 1.4;
        }

        .accent-text { color: var(--accent); font-weight: bold; }

        /* Иконка стрелочки для селекта */
        select { appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/1999/xlink" viewBox="0 0 256 256" fill="white"><path d="M225.8,98.2l-91,91c-2.4,2.4-5.6,3.8-9,3.8s-6.6-1.4-9-3.8l-91-91c-5-5-5-13,0-18s13-5,18,0l82,82l82-82c5-5,13-5,18,0S230.8,93.2,225.8,98.2z"/></svg>'); background-repeat: no-repeat; background-position: right 15px center; background-size: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>⚓ БИРЖА УЛОВА</h2>
            
            <label>Вид рыбы</label>
            <select id="fish">
                <option value="Пеленгас">Пеленгас (крупный)</option>
                <option value="Кефаль">Кефаль</option>
                <option value="Ставрида">Ставрида</option>
                <option value="Барабуля">Барабуля</option>
                <option value="Рапаны">Рапаны</option>
                <option value="Другое">Другое (указать в описании)</option>
            </select>

            <label>Цена за кг (руб)</label>
            <input type="number" id="price" placeholder="Напр: 350" inputmode="numeric">

            <label>Описание / Место вылова</label>
            <textarea id="desc" rows="3" placeholder="Напр: Керчь, утренний вылов. Очень свежий!"></textarea>

            <button class="btn" onclick="sendToMarket()">Выложить на биржу</button>

            <div class="footer-info">
                Ваше объявление получит статус <span class="accent-text">АКТИВНО</span>.<br>
                Покупатели свяжутся с вами через <span class="accent-text">личные сообщения</span>.
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function sendToMarket() {
            // Виброотклик при клике
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const data = {
                date: new Date().toLocaleDateString('ru-RU'),
                seller_name: tg.initDataUnsafe.user?.first_name || "Рыбак",
                username: tg.initDataUnsafe.user?.username || "нет_имени",
                fish_type: document.getElementById('fish').value,
                price: document.getElementById('price').value,
                location_desc: document.getElementById('desc').value,
                status: "Активно"
            };

            // Простая валидация
            if (!data.price || data.price <= 0) {
                tg.showAlert("Бро, без цены пеленгас не продашь! Укажи цену.");
                return;
            }

            if (data.username === "нет_имени") {
                tg.showAlert("У тебя в настройках Telegram не задан @username. Покупатели не смогут тебе написать!");
                return;
            }

            // Шлем на твой вебхук в Make
            fetch('https://hook.eu1.make.com/g7ub47urk13e10g3vbgm635udv2udk4l', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => {
                tg.showAlert("Красава! Твой улов уже летит в канал.");
                tg.close();
            }).catch(err => {
                tg.showAlert("Ошибка связи. Проверь сеть!");
            });
        }
    </script>
</body>
</html>
