<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рынок Крым: Онлайн</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #fbbf24;
            --text: #f8fafc;
            --border: #334155;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); 
            margin: 0; padding: 16px; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            -webkit-user-select: none;
        }

        .container { width: 100%; max-width: 400px; }

        .screen { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(251, 191, 36, 0.1);
            margin-bottom: 15px;
        }

        h2 { margin: 0 0 15px 0; font-size: 18px; text-align: center; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        .seller-item { border-bottom: 1px solid var(--border); padding: 15px 0; }
        .seller-item:last-child { border: none; }
        .seller-photo { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; background: #0f172a; border: 1px solid var(--border); }
        .seller-info { font-size: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        .progress-container { background: #0f172a; border-radius: 12px; height: 12px; margin: 15px 0; overflow: hidden; border: 1px solid var(--border); }
        .progress-bar { background: linear-gradient(90deg, var(--accent), #f59e0b); height: 100%; transition: width 0.5s ease; width: 0%; }
        
        .ref-box { background: #0f172a; border: 1px dashed var(--accent); padding: 12px; border-radius: 12px; text-align: center; margin: 15px 0; word-break: break-all; }

        label { display: block; margin: 12px 0 6px 4px; font-size: 13px; font-weight: 600; color: #94a3b8; }

        input, textarea { 
            width: 100%; padding: 12px; background: #0f172a; 
            border: 2px solid var(--border); border-radius: 12px; 
            color: white; font-size: 15px; box-sizing: border-box; outline: none; transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: var(--accent); }

        .btn { 
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white; border: none; padding: 16px; width: 100%;
            border-radius: 14px; font-size: 16px; font-weight: 800;
            cursor: pointer; text-transform: uppercase; margin-top: 10px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary { background: #3b82f6; margin-top: 20px; }
        .btn-ghost { background: #475569; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen-market" class="screen active">
            <div class="card">
                <h2>⚓️ РЫНОК КРЫМ: ОНЛАЙН</h2>
                <div id="market-list">Загрузка витрины...</div>
            </div>
            <button class="btn btn-secondary" onclick="showScreen('screen-seller')">🏪 Мой прилавок / Вход</button>
        </div>

        <div id="screen-seller" class="screen">
            <div class="card">
                <h2>🏪 УПРАВЛЕНИЕ ПРИЛАВКОМ</h2>
                
                <div id="referral-block">
                    <p style="text-align: center; font-size: 14px; color: #94a3b8;">Пригласи 5 друзей в канал, чтобы открыть свой прилавок.</p>
                    <div class="progress-container"><div id="ref-progress" class="progress-bar"></div></div>
                    <p id="ref-status" style="text-align: center; font-weight: bold; color: var(--accent);">0 / 5 друзей вступило</p>
                    
                    <div class="ref-box">
                        <span style="font-size: 11px; color: #94a3b8;">Твоя ссылка для приглашений:</span><br>
                        <span id="invite-link" style="color: var(--accent); font-weight: bold; font-family: monospace;">Загрузка...</span>
                    </div>
                    <button class="btn" onclick="copyInvite()">🔗 Скопировать ссылку</button>
                </div>

                <div id="seller-form" style="display: none;">
                    <p style="text-align: center; color: var(--success); font-weight: bold; margin-bottom: 15px;">✓ Доступ открыт!</p>
                    
                    <label>📸 Фото ассортимента</label>
                    <div style="background:#0f172a; border:2px dashed var(--border); border-radius:12px; padding:15px; text-align:center; cursor:pointer;" onclick="document.getElementById('file-input').click()">
                        <span id="upload-text" style="color: var(--accent);">Нажми, чтобы выбрать фото</span>
                        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="processImage(this)">
                        <img id="preview" src="" style="width:100%; border-radius:10px; margin-top:10px; display:none;">
                    </div>

                    <label>🐟 Ассортимент и цены</label>
                    <textarea id="items" rows="5" placeholder="Пеленгас - 350р&#10;Кефаль - 400р"></textarea>
                    
                    <label>📍 Район / Место</label>
                    <input type="text" id="location" placeholder="Напр: Аршинцево">

                    <button class="btn" id="save-btn" onclick="saveData()">🚀 Сохранить изменения</button>
                </div>
            </div>
            <button class="btn btn-ghost" onclick="showScreen('screen-market')">← Назад на рынок</button>
        </div>

    </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHexoh9i-MP0akfd5O_1q_wtTjJDuC5x22MXWXV5t_1-cXV5HsKg6ks0P2fj7HXdhGzTpIO_H2Vqck/pub?output=csv';
    const WEBHOOK_REG = 'https://hook.eu1.make.com/g7ub47urk13e10g3vbgm635udv2udk4l';
    const WEBHOOK_SAVE = 'https://hook.eu1.make.com/ua35ta44c98q2o9gnyfc8c8sr1qzcksy'; 

    let base64Photo = "";

    // Умный парсер CSV (защита от запятых и пустых колонок)
    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            if (!line.trim()) continue;
            let row = [];
            let curr = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                if (line[i] === '"') inQuotes = !inQuotes;
                else if (line[i] === ',' && !inQuotes) { row.push(curr); curr = ''; }
                else curr += line[i];
            }
            row.push(curr);
            rows.push(row.map(v => v.replace(/^"|"$/g, '').trim()));
        }
        return rows;
    }

    async function init() {
        setTimeout(async () => {
            const user = tg.initDataUnsafe?.user;
            
            if (!user) {
                document.getElementById('market-list').innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <p>⚠️ Телеграм не передал данные профиля.</p>
                        <p style="font-size:12px; color:#94a3b8;">Пожалуйста, открывай приложение только через меню бота.</p>
                        <button class="btn" style="padding:10px; margin-top:10px;" onclick="location.reload()">Обновить страницу</button>
                    </div>`;
                return;
            }

            try {
                const response = await fetch(`${CSV_URL}&nocache=${Date.now()}`);
                const text = await response.text();
                const rows = parseCSV(text);

                renderMarket(rows);
                checkSellerStatus(rows, user);
            } catch (e) {
                console.error("Ошибка загрузки:", e);
                tg.showAlert("Сбой связи с базой. Проверь интернет.");
            }
        }, 200);
    }

    function renderMarket(rows) {
        const list = document.getElementById('market-list');
        list.innerHTML = '';
        
        rows.slice(1).forEach(row => {
            // Проверяем Колонку B (Статус)
            if (row[1] && row[1].trim() === 'Active') { 
                
                // Проверяем Колонку H (Фото - индекс 7)
                const photoHtml = row[7] && row[7].startsWith('http') 
                    ? `<img src="${row[7]}" class="seller-photo" alt="Фото улова">` 
                    : '';
                
                // Вытаскиваем юзернейм из Колонки F (индекс 5). Отрезаем "Имя / ", берем только последнее слово без @
                const nameStr = row[5] || 'Рыбак';
                const pureName = nameStr.split('/')[0].trim();
                const pureUsername = nameStr.split('/').pop().replace('@', '').trim();

                list.innerHTML += `
                    <div class="seller-item">
                        ${photoHtml}
                        <div class="seller-info">
                            <b>👤 ${pureName}</b> 
                            <span style="color:var(--accent)">📍 ${row[8] || 'Крым'}</span>
                        </div>
                        <div style="font-size:14px; color:#e2e8f0; white-space: pre-wrap; line-height: 1.4; margin-bottom:12px;">${row[6] || 'Уточняйте наличие...'}</div>
                        <button class="btn" style="padding:10px; font-size:13px;" onclick="window.open('https://t.me/${pureUsername}')">💬 Написать продавцу</button>
                    </div>`;
            }
        });
        if (!list.innerHTML) list.innerHTML = '<p style="text-align:center; color:#94a3b8; margin-top:30px;">На рынке пока пусто... Будь первым!</p>';
    }

    async function checkSellerStatus(rows, user) {
        const seller = rows.find(r => r[0] && r[0].trim() == user.id.toString());
        
        if (seller) {
            const status = seller[1] ? seller[1].trim() : 'Pending';     // B: Статус
            const friends = parseInt(seller[2]) || 0;                    // C: Приглашено
            const link = seller[3] ? seller[3].trim() : '';              // D: Инвайт-ссылка

            document.getElementById('ref-progress').style.width = Math.min((friends / 5) * 100, 100) + '%';
            document.getElementById('ref-status').innerText = `${friends} / 5 друзей вступило`;
            
            if (link) {
                document.getElementById('invite-link').innerText = link;
            } else {
                document.getElementById('invite-link').innerHTML = "<i>Генерируем ссылку... Зайди через 5 мин.</i>";
            }

            if (status === 'Active' || friends >= 5) {
                document.getElementById('referral-block').style.display = 'none';
                document.getElementById('seller-form').style.display = 'block';
                
                // G: Ассортимент (Индекс 6)
                document.getElementById('items').value = seller[6] || '';
                
                // I: Район (Индекс 8)
                document.getElementById('location').value = seller[8] || '';
                
                // H: Фото (Индекс 7)
                if (seller[7] && seller[7].startsWith('http')) {
                    document.getElementById('preview').src = seller[7];
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('upload-text').innerText = "Изменить текущее фото";
                }
            }
        } else {
            if (sessionStorage.getItem('reg_sent')) {
                document.getElementById('invite-link').innerHTML = "<i>Регистрация в процессе...<br>Обновление базы займет 5 минут.</i>";
                return;
            }
            registerNewSeller(user);
        }
    }

    async function registerNewSeller(user) {
        sessionStorage.setItem('reg_sent', 'true'); 
        try {
            const res = await fetch(WEBHOOK_REG, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: user.id,
                    name: user.first_name,
                    username: user.username
                })
            });
            if (res.ok) {
                tg.showAlert("Регистрация успешна! Твоя ссылка появится здесь через 5-10 минут.");
                document.getElementById('invite-link').innerHTML = "<i>Ожидание базы Google...</i>";
            }
        } catch (e) {
            console.error("Ошибка рега", e);
            sessionStorage.removeItem('reg_sent'); 
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'screen-market') init(); 
    }

    function copyInvite() {
        const link = document.getElementById('invite-link').innerText;
        if (link.includes('http')) {
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            tg.showScanQrPopup({text: "Ссылка скопирована!"}); 
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        } else {
            tg.showAlert("Ссылка еще готовится. Подожди немного.");
        }
    }

    function processImage(input) {
        const file = input.files[0];
        if (!file) return;
        
        document.getElementById('upload-text').innerText = "⏳ Обработка фото...";
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                let width = img.width, height = img.height;
                
                if (width > MAX_WIDTH) { 
                    height *= MAX_WIDTH / width; 
                    width = MAX_WIDTH; 
                }
                
                canvas.width = width; 
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const fullDataUrl = canvas.toDataURL('image/jpeg', 0.6);
                base64Photo = fullDataUrl.split(',')[1];
                
                document.getElementById('preview').src = fullDataUrl;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('upload-text').innerText = "Фото выбрано ✓";
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    async function saveData() {
        const btn = document.getElementById('save-btn');
        const user = tg.initDataUnsafe?.user;
        if (!user) return;

        btn.disabled = true;
        btn.innerText = "⏳ ПУБЛИКАЦИЯ...";

        const data = {
            id: user.id,
            items: document.getElementById('items').value,
            location: document.getElementById('location').value,
            image_base64: base64Photo, 
            image_name: `photo_${user.id}_${Date.now()}.jpg` 
        };

        try {
            const res = await fetch(WEBHOOK_SAVE, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                tg.showAlert("Отлично! Данные сохранены. Они обновятся на витрине в течение 5 минут.");
                showScreen('screen-market');
            } else {
                throw new Error("Bad webhook response");
            }
        } catch (e) {
            console.error(e);
            tg.showAlert("Ошибка при сохранении. Проверьте подключение.");
        } finally {
            btn.disabled = false;
            btn.innerText = "🚀 Сохранить изменения";
        }
    }

    init();
    </script>
</body>
</html>
