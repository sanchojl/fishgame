<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Биржа Улова: Выложить</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #fbbf24;
            --text: #f8fafc;
            --input-border: #334155;
            --btn-green: #22c55e;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); 
            margin: 0; padding: 16px; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        h2 { 
            margin: 0 0 20px 0; font-size: 24px; text-align: center; 
            color: var(--accent); letter-spacing: 1px; text-transform: uppercase;
        }

        label { 
            display: block; margin: 15px 0 8px 4px; 
            font-size: 14px; font-weight: 600; color: #94a3b8;
        }

        /* Стиль зоны загрузки фото */
        .photo-upload {
            border: 2px dashed var(--input-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: #0f172a;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .photo-upload:active { border-color: var(--accent); background: rgba(251, 191, 36, 0.05); }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        .upload-icon { font-size: 24px; display: block; margin-bottom: 5px; }

        select, input, textarea { 
            width: 100%; padding: 14px; 
            background: #0f172a; border: 2px solid var(--input-border);
            border-radius: 12px; color: white; font-size: 16px; 
            box-sizing: border-box; transition: 0.3s; outline: none;
        }

        select:focus, input:focus, textarea:focus { 
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.1);
        }

        .btn { 
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white; border: none; padding: 18px; 
            width: 100%; border-radius: 14px; font-size: 18px; 
            font-weight: 800; cursor: pointer; margin-top: 25px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            transition: 0.2s; text-transform: uppercase;
        }

        .btn:disabled { background: #475569; box-shadow: none; cursor: not-allowed; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .footer-info { 
            margin-top: 20px; font-size: 11px; 
            color: #64748b; text-align: center; line-height: 1.4;
        }

        .accent-text { color: var(--accent); font-weight: bold; }

        select { appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/1999/xlink" viewBox="0 0 256 256" fill="white"><path d="M225.8,98.2l-91,91c-2.4,2.4-5.6,3.8-9,3.8s-6.6-1.4-9-3.8l-91-91c-5-5-5-13,0-18s13-5,18,0l82,82l82-82c5-5,13-5,18,0S230.8,93.2,225.8,98.2z"/></svg>'); background-repeat: no-repeat; background-position: right 15px center; background-size: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>⚓ БИРЖА УЛОВА</h2>
            
            <label>Фото улова (обязательно)</label>
            <div class="photo-upload" onclick="document.getElementById('file-input').click()">
                <span class="upload-icon">📸</span>
                <span id="upload-text">Нажми, чтобы прикрепить фото</span>
                <input type="file" id="file-input" accept="image/*" style="display:none" onchange="compressImage(this)">
                <img id="preview" src="" alt="Предпросмотр">
            </div>

            <label>Вид рыбы</label>
            <select id="fish">
                <option value="Пеленгас">Пеленгас (крупный)</option>
                <option value="Кефаль">Кефаль</option>
                <option value="Ставрида">Ставрида</option>
                <option value="Барабуля">Барабуля</option>
                <option value="Рапаны">Рапаны</option>
                <option value="Другое">Другое (указать в описании)</option>
            </select>

            <label>Цена за кг (руб)</label>
            <input type="number" id="price" placeholder="Напр: 350" inputmode="numeric">

            <label>Описание / Место вылова</label>
            <textarea id="desc" rows="3" placeholder="Напр: Керчь, утренний вылов. Очень свежий!"></textarea>

            <button class="btn" id="submit-btn" onclick="sendToMarket()">Выложить на биржу</button>

            <div class="footer-info">
                Ваше объявление получит статус <span class="accent-text">АКТИВНО</span>.<br>
                Покупатели свяжутся с вами через <span class="accent-text">личные сообщения</span>.
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let base64Photo = "";

        // Сжатие картинки
        function compressImage(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    base64Photo = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('preview').src = base64Photo;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('upload-text').style.display = 'none';
                    document.querySelector('.upload-icon').style.display = 'none';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function sendToMarket() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const btn = document.getElementById('submit-btn');
            
            const data = {
                date: new Date().toLocaleDateString('ru-RU'),
                seller_name: tg.initDataUnsafe.user?.first_name || "Рыбак",
                username: tg.initDataUnsafe.user?.username || "нет_имени",
                fish_type: document.getElementById('fish').value,
                price: document.getElementById('price').value,
                location_desc: document.getElementById('desc').value,
                image: base64Photo, // ФОТО ТУТ
                status: "Активно"
            };

            if (!base64Photo) {
                tg.showAlert("Бро, без фото пеленгаса никто не купит! Прикрепи картинку.");
                return;
            }

            if (!data.price || data.price <= 0) {
                tg.showAlert("Укажи цену!");
                return;
            }

            if (data.username === "нет_имени") {
                tg.showAlert("Задай @username в настройках ТГ!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ОТПРАВЛЯЮ...";

            fetch('https://hook.eu1.make.com/g7ub47urk13e10g3vbgm635udv2udk4l', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(() => {
                tg.showAlert("Красава! Свежак уже в канале.");
                tg.close();
            }).catch(err => {
                tg.showAlert("Ошибка! Проверь сеть.");
                btn.disabled = false;
                btn.innerText = "Выложить на биржу";
            });
        }
    </script>
</body>
</html>
