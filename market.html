<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рынок Крым: Онлайн</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #fbbf24;
            --text: #f8fafc;
            --border: #334155;
            --success: #22c55e;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); 
            margin: 0; padding: 16px; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        /* Экраны */
        .screen { display: none; width: 100%; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(251, 191, 36, 0.1);
            margin-bottom: 15px;
        }

        h2 { margin: 0 0 15px 0; font-size: 20px; text-align: center; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        /* Стили для рынка */
        .seller-item { border-bottom: 1px solid var(--border); padding: 12px 0; }
        .seller-item:last-child { border: none; }
        .seller-info { font-size: 14px; margin-bottom: 8px; }

        /* Стили рефералов */
        .progress-container { background: #0f172a; border-radius: 12px; height: 12px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: var(--accent); height: 100%; transition: width 0.5s ease; width: 0%; }
        .ref-box { background: #0f172a; border: 1px dashed var(--accent); padding: 12px; border-radius: 12px; text-align: center; margin: 15px 0; font-family: monospace; }

        label { display: block; margin: 12px 0 6px 4px; font-size: 13px; font-weight: 600; color: #94a3b8; }

        input, textarea { 
            width: 100%; padding: 12px; background: #0f172a; 
            border: 2px solid var(--border); border-radius: 12px; 
            color: white; font-size: 15px; box-sizing: border-box; outline: none; margin-bottom: 10px;
        }

        .btn { 
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white; border: none; padding: 16px; width: 100%;
            border-radius: 14px; font-size: 16px; font-weight: 800;
            cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }

        .btn-secondary { background: #3b82f6; margin-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="screen-market" class="screen active">
            <div class="card">
                <h2>⚓️ РЫНОК ОНЛАЙН</h2>
                <div id="market-list">Загрузка витрины...</div>
            </div>
            <button class="btn btn-secondary" onclick="showScreen('screen-seller')">Мой прилавок / Вход</button>
        </div>

        <div id="screen-seller" class="screen">
            <div class="card">
                <h2>🏪 МОЙ ПРИЛАВОК</h2>
                
                <div id="referral-block">
                    <p style="text-align: center; font-size: 14px; color: #94a3b8;">Пригласи 5 друзей в канал, чтобы открыть свой прилавок.</p>
                    <div class="progress-container"><div id="ref-progress" class="progress-bar"></div></div>
                    <p id="ref-status" style="text-align: center; font-weight: bold;">0 / 5 друзей вступило</p>
                    
                    <div class="ref-box">
                        <span style="font-size: 11px; color: #94a3b8;">Твоя ссылка для приглашений:</span><br>
                        <span id="invite-link" style="color: var(--accent);">Создается...</span>
                    </div>
                    <button class="btn" onclick="copyInvite()">Скопировать ссылку</button>
                </div>

                <div id="seller-form" style="display: none;">
                    <p style="text-align: center; color: var(--success); font-weight: bold; margin-bottom: 15px;">✓ Доступ открыт!</p>
                    
                    <label>📸 Фото ассортимента</label>
                    <div style="background:#0f172a; border:2px dashed var(--border); border-radius:12px; padding:15px; text-align:center; cursor:pointer;" onclick="document.getElementById('file-input').click()">
                        <span id="upload-text">Изменить фото</span>
                        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="compressImage(this)">
                        <img id="preview" src="" style="width:100%; border-radius:10px; margin-top:10px; display:none;">
                    </div>

                    <label>🐟 Ассортимент и цены</label>
                    <textarea id="items" rows="5" placeholder="Пеленгас - 350р&#10;Кефаль - 400р"></textarea>
                    
                    <label>📍 Район / Место</label>
                    <input type="text" id="location" placeholder="Напр: Аршинцево">

                    <button class="btn" id="save-btn" onclick="saveData()">Сохранить изменения</button>
                </div>
            </div>
            <button class="btn btn-secondary" style="background:#475569" onclick="showScreen('screen-market')">← Назад на рынок</button>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // !!! ЗАМЕНИ ЭТУ ССЫЛКУ НА СВОЮ CSV ССЫЛКУ ИЗ GOOGLE ТАБЛИЦЫ !!!
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHexoh9i-MP0akfd5O_1q_wtTjJDuC5x22MXWXV5t_1-cXV5HsKg6ks0P2fj7HXdhGzTpIO_H2Vqck/pub?output=csv';
        const WEBHOOK_REG = 'https://hook.eu1.make.com/g7ub47urk13e10g3vbgm635udv2udk4l';
        const WEBHOOK_SAVE = 'https://hook.eu1.make.com/ВАШ_ВЕБХУК_СОХРАНЕНИЯ';

        let base64Photo = "";

        async function init() {
            const user = tg.initDataUnsafe?.user;
            if (!user) return;

            try {
                const response = await fetch(CSV_URL + '&cache=' + Math.random());
                const csvData = await response.text();
                const rows = csvData.split('\n').map(row => row.split(','));

                renderMarket(rows);
                checkSellerStatus(rows, user);
            } catch (e) {
                console.error("Ошибка загрузки данных", e);
            }
        }

        function renderMarket(rows) {
            const list = document.getElementById('market-list');
            list.innerHTML = '';
            
            // Пропускаем шапку, ищем активных
            rows.slice(1).forEach(row => {
                if (row[1] === 'Active') { // Допустим, Колонка 1 - Статус
                    list.innerHTML += `
                        <div class="seller-item">
                            <div class="seller-info"><b>👤 ${row[5]}</b> (${row[8] || 'Район не указан'})</div>
                            <div style="font-size:13px; color:#cbd5e1;">${row[6] || 'Загрузка ассортимента...'}</div>
                            <button class="btn" style="padding:8px; font-size:12px; margin-top:8px;" onclick="window.open('https://t.me/${row[2]}')">Написать продавцу</button>
                        </div>
                    `;
                }
            });
            if (list.innerHTML === '') list.innerHTML = 'На рынке пока пусто...';
        }

        function checkSellerStatus(rows, user) {
            const seller = rows.find(r => r[0] == user.id);
            
            if (seller) {
                const friends = parseInt(seller[2]) || 0;
                document.getElementById('ref-progress').style.width = Math.min((friends / 5) * 100, 100) + '%';
                document.getElementById('ref-status').innerText = `${friends} / 5 друзей вступило`;
                document.getElementById('invite-link').innerText = seller[3] || 'Генерируется...';

                if (friends >= 5 || seller[1] === 'Active') {
                    document.getElementById('referral-block').style.display = 'none';
                    document.getElementById('seller-form').style.display = 'block';
                    // Предзаполняем поля из таблицы
                    document.getElementById('items').value = seller[6] || '';
                    document.getElementById('location').value = seller[8] || '';
                }
            } else {
                // Если продавца нет в базе - шлем запрос в Make на регистрацию
                registerNewSeller(user);
            }
        }

        async function registerNewSeller(user) {
            fetch(WEBHOOK_REG, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: user.id,
                    name: user.first_name,
                    username: user.username
                })
            });
        }

        async function saveData() {
            const btn = document.getElementById('save-btn');
            const data = {
                id: tg.initDataUnsafe.user.id,
                items: document.getElementById('items').value,
                location: document.getElementById('location').value,
                image: base64Photo
            };

            btn.disabled = true;
            btn.innerText = "СОХРАНЯЮ...";

            await fetch(WEBHOOK_SAVE, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            tg.showAlert("Данные витрины обновлены!");
            btn.disabled = false;
            btn.innerText = "Сохранить изменения";
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function copyInvite() {
            const link = document.getElementById('invite-link').innerText;
            if (link.includes('http')) {
                navigator.clipboard.writeText(link);
                tg.showAlert("Ссылка скопирована! Разошли её друзьям.");
            }
        }

        function compressImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    base64Photo = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('preview').src = base64Photo;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('upload-text').innerText = "Фото выбрано ✓";
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        init();
    </script>
</body>
</html>
