<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рынок Улова: Крым</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #fbbf24;
            --text: #f8fafc;
            --input-border: #334155;
            --btn-green: #22c55e;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); 
            margin: 0; padding: 16px; color: var(--text);
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        h2 { margin: 0 0 20px 0; font-size: 24px; text-align: center; color: var(--accent); text-transform: uppercase; }

        label { display: block; margin: 15px 0 8px 4px; font-size: 14px; font-weight: 600; color: #94a3b8; }

        .photo-upload {
            border: 2px dashed var(--input-border);
            border-radius: 12px; padding: 20px; text-align: center;
            cursor: pointer; background: #0f172a; margin-bottom: 10px;
        }

        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }

        select, input, textarea { 
            width: 100%; padding: 14px; background: #0f172a; 
            border: 2px solid var(--input-border); border-radius: 12px; 
            color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }

        select:focus, input:focus, textarea:focus { border-color: var(--accent); }

        .btn { 
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white; border: none; padding: 18px; width: 100%;
            border-radius: 14px; font-size: 18px; font-weight: 800;
            cursor: pointer; margin-top: 25px; text-transform: uppercase;
        }

        .btn:disabled { background: #475569; opacity: 0.6; }

        .footer-info { margin-top: 20px; font-size: 11px; color: #64748b; text-align: center; }
        .accent-text { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>⚓ БИРЖА УЛОВА</h2>
            
            <label>Фото улова (обязательно)</label>
            <div class="photo-upload" onclick="document.getElementById('file-input').click()">
                <span id="upload-icon">📸</span>
                <span id="upload-text">Нажми, чтобы выбрать фото</span>
                <input type="file" id="file-input" accept="image/*" style="display:none" onchange="compressImage(this)">
                <img id="preview" src="" alt="Предпросмотр">
            </div>

            <label>Вид рыбы</label>
            <select id="fish">
                <option value="Пеленгас">Пеленгас (крупный)</option>
                <option value="Кефаль">Кефаль</option>
                <option value="Ставрида">Ставрида</option>
                <option value="Барабуля">Барабуля</option>
                <option value="Другое">Другое</option>
            </select>

            <label>Цена за кг (руб)</label>
            <input type="number" id="price" placeholder="Напр: 350" inputmode="numeric">

            <label>Описание</label>
            <textarea id="desc" rows="3" placeholder="Где и когда поймали?"></textarea>

            <button class="btn" id="submit-btn" onclick="sendToMarket()">Выложить на биржу</button>

            <div class="footer-info">
                Ваше объявление получит статус <span class="accent-text">АКТИВНО</span>.
            </div>
        </div>
    </div>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        let base64Photo = "";

        // Функция сжатия
        function compressImage(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    base64Photo = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('preview').src = base64Photo;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('upload-text').style.display = 'none';
                    document.getElementById('upload-icon').style.display = 'none';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        // ГЛАВНАЯ ФУНКЦИЯ
        async function sendToMarket() {
            try {
                // 1. Проверяем нажатие
                console.log("Кнопка нажата");
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

                const btn = document.getElementById('submit-btn');
                const price = document.getElementById('price').value;
                const fish = document.getElementById('fish').value;
                const desc = document.getElementById('desc').value;

                // 2. Валидация
                if (!base64Photo) {
                    alert("Бро, прикрепи фото рыбы!");
                    return;
                }

                if (!price || price <= 0) {
                    alert("Укажи цену!");
                    return;
                }

                // Собираем данные безопасно
                const user = tg.initDataUnsafe?.user;
                const data = {
                    date: new Date().toLocaleDateString('ru-RU'),
                    seller_name: user?.first_name || "Рыбак (Браузер)",
                    username: user?.username || "no_username",
                    fish_type: fish,
                    price: price,
                    location_desc: desc,
                    image: base64Photo,
                    status: "Активно"
                };

                // Проверка на username
                if (data.username === "no_username" && tg.initDataUnsafe?.user) {
                    alert("Задай @username в настройках Telegram!");
                    return;
                }

                // Блокируем кнопку
                btn.disabled = true;
                btn.innerText = "ОТПРАВЛЯЮ...";

                // 3. ОТПРАВКА
                const response = await fetch('https://hook.eu1.make.com/g7ub47urk13e10g3vbgm635udv2udk4l', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert("Красава! Рыба на рынке.");
                    tg.close();
                } else {
                    throw new Error("Сервер Make.com вернул ошибку");
                }

            } catch (error) {
                alert("Ошибка: " + error.message);
                const btn = document.getElementById('submit-btn');
                btn.disabled = false;
                btn.innerText = "Выложить на рынок";
            }
        }
    </script>
</body>
</html>
